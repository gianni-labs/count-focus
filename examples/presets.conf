# Ejemplo de configuración de presets para count-focus.
#
# Copiá este archivo a:
#   ~/.config/count-focus/presets.conf
# (o a $XDG_CONFIG_HOME/count-focus/presets.conf si tenés esa variable seteada)
#
# Formato: un preset por línea, "nombre = duración".
# La duración usa el mismo formato que la CLI: h, m, s (ej. 25m, 1h30m, 90s).
# Las líneas vacías y las que empiezan con # se ignoran.
#
# Los presets que definas acá SOBREESCRIBEN o EXTIENDEN los built-in.
# Built-in por defecto: short-break = 5m, long-break = 15m.
# "pomodoro" está reservado para el ciclo estándar completo y no se puede redefinir.

# Sobreescribir un built-in:
short-break = 10m

# Agregar presets propios:
deep-work = 90m
review = 45m
break = 10m
